<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q4 Seatwork 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

        body{
            background-image: url("https://i.pinimg.com/1200x/6d/e4/9a/6de49a938f344f0937f63f75417839b2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
        }

        .main-card{
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            padding: 40px;
            margin-top: 80px;
            max-width: 400px;
        }

</style>

</head>
<body>
<center>
    <div class="container d-flex justify-content-center">
        <div class="main-card">
        <h1 class="text-center mb-4">Log In</h1>
    
   <form>

        <label>Username:</label>
        <input type="text" id="username" name="username" placeholder="Username..." class="form-control mb-3">

        <label>Password:</label>
        <input type="password" id="password" name="password" placeholder="******" class="form-control mb-3">

        <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="showPass" onclick="togglePass()">
        <label class="form-check-label">Show Password</label>


    </div>

        
    <button type="submit" class="btn btn-primary w-100">Log In</button>

</form>

</div>
</div>
</center>

<script>

function function_name_here() {

let inputs = document.getElementsByTagName("input");

let enteredUser = inputs[0].value;
let enteredPass = inputs[1].value;

let correctUser = "admin";
let correctPass = "12345";

switch(true){

case (enteredUser === correctUser && enteredPass === correctPass):
alert("Login successful!");
break;

case (enteredUser === "" || enteredPass === ""):
alert("Please enter username and password");
break;

default:
alert("Wrong username or password");
break;

}

}

document.querySelector("form").addEventListener("submit", function(event){
event.preventDefault();
function_name_here();
});

</script>

</body>
</html>
